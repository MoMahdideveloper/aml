<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>{{pageTitle}}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#d8e4f3",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#47473e",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9ff",
                        "surface": "#f7f9ff",
                        "primary-fixed": "#d3e4fa",
                        "on-primary-container": "#93a4b8",
                        "on-primary": "#ffffff",
                        "secondary-container": "#e0dfdf",
                        "tertiary": "#23241c",
                        "surface-container-highest": "#d8e4f3",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#c6c6c6",
                        "surface-tint": "#506072",
                        "surface-dim": "#d0dbea",
                        "on-primary-fixed": "#0c1d2d",
                        "secondary": "#5d5e5f",
                        "primary": "#142435",
                        "on-error-container": "#93000a",
                        "surface-white": "#FFFFFF",
                        "on-secondary-fixed-variant": "#464747",
                        "tertiary-container": "#393930",
                        "primary-fixed-dim": "#b7c8dd",
                        "inverse-primary": "#b7c8dd",
                        "on-secondary-container": "#626363",
                        "on-surface-variant": "#44474c",
                        "primary-container": "#2a3a4b",
                        "on-error": "#ffffff",
                        "surface-bright": "#f7f9ff",
                        "on-surface": "#111d27",
                        "surface-container-low": "#edf4ff",
                        "surface-container-high": "#dee9f8",
                        "on-tertiary-fixed": "#1c1c14",
                        "inverse-surface": "#26313d",
                        "error-red": "#BA1A1A",
                        "on-background": "#111d27",
                        "error-container": "#ffdad6",
                        "surface-container": "#e3effe",
                        "on-secondary-fixed": "#1a1c1c",
                        "tertiary-fixed-dim": "#c8c7bb",
                        "outline": "#74777d",
                        "inverse-on-surface": "#e8f2ff",
                        "on-tertiary-container": "#a3a297",
                        "secondary-fixed": "#e3e2e2",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#e5e3d6",
                        "outline-variant": "#c4c6cc",
                        "on-primary-fixed-variant": "#38485a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "base": "8px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "max-width": "1280px"
                    },
                    "fontFamily": {
                        "label-sm": ["IBM Plex Sans"],
                        "body-md": ["IBM Plex Sans"],
                        "headline-md": ["IBM Plex Sans"],
                        "body-lg": ["IBM Plex Sans"],
                        "label-md": ["IBM Plex Sans"],
                        "headline-lg-mobile": ["IBM Plex Sans"],
                        "headline-lg": ["IBM Plex Sans"],
                        "display-lg": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #F4F2E5; /* Cream base as requested in style guidance */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-surface antialiased pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background dark:bg-background border-b border-outline-variant dark:border-outline z-40">
<div class="flex justify-between items-center px-margin-mobile py-4 w-full">
<button aria-label="Menu" class="text-primary dark:text-primary-fixed cursor-pointer active:opacity-80 p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-2xl">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed tracking-tight">{{brandName}}</h1>
<button aria-label="Agent Profile" class="cursor-pointer active:opacity-80 rounded-full overflow-hidden w-8 h-8 hover:bg-surface-variant transition-colors">
<img alt="Agent Profile" class="w-full h-full object-cover" src="{{userAvatarUrl}}"
                     onerror="this.src='/images/default-avatar.png'"/>
</button>
</div>
</header>
<main class="px-margin-mobile pt-6 pb-8 space-y-6">
<!-- Page Header & Search -->
<div class="space-y-4">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">{{pageHeading}}</h2>
<div class="flex gap-4">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-white border border-outline-variant rounded-xl font-body-md text-on-surface focus:border-primary focus:ring-0 transition-colors" placeholder="{{searchPlaceholder}}" type="text"/>
</div>
<button class="bg-primary text-on-primary w-12 h-12 rounded-xl flex items-center justify-center hover:bg-primary-container active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Agent List -->
<div class="space-y-4">
{% for agent in agents %}
<div class="bg-surface-white rounded-xl border border-outline-variant p-5 shadow-[0_8px_30px_rgba(27,38,49,0.06)] hover:shadow-lg transition-shadow">
<div class="flex items-start justify-between mb-4">
<div class="flex items-center gap-3">
<img alt="{{agent.name}} Avatar" class="w-12 h-12 rounded-full object-cover" src="{{agent.avatarUrl}}">
<div>
<h3 class="font-headline-md text-headline-md !text-lg text-primary">{{agent.name}}</h3>
<span class="inline-block px-2 py-0.5 mt-1 border border-outline-variant rounded-full font-label-sm text-label-sm text-on-surface-variant">{{agent.specialization}}</span>
</div>
</div>
<div class="flex gap-2">
<button aria-label="Email {{agent.name}}" class="text-on-surface-variant hover:text-primary transition-colors p-1">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">mail</span>
</button>
<button aria-label="Call {{agent.name}}" class="text-on-surface-variant hover:text-primary transition-colors p-1">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
</div>
<div class="grid grid-cols-3 gap-2 py-4 border-y border-outline-variant mb-4">
<div class="text-center">
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Active</div>
<div class="font-headline-md text-headline-md !text-xl text-primary">{{agent.active_listings}}</div>
</div>
<div class="text-center border-x border-outline-variant">
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Deals</div>
<div class="font-headline-md text-headline-md !text-xl text-primary">{{agent.total_deals}}</div>
</div>
<div class="text-center">
<div class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Pending</div>
<div class="font-headline-md text-headline-md !text-xl text-primary">{{agent.pending_tasks}}</div>
</div>
</div>
<div class="flex justify-between items-center">
<button class="font-label-md text-label-md text-primary hover:text-primary-container flex items-center gap-1 transition-colors">
                        View Dashboard <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<div class="flex gap-3">
<button aria-label="Edit {{agent.name}}'s profile" class="text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">edit</span>
</button>
<button aria-label="Delete {{agent.name}}'s profile" class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
</div>
</div>
{% endfor %}
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-white dark:bg-surface-container fixed bottom-0 w-full z-50 rounded-t-full shadow-lg md:hidden">
<div class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-white">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant py-1 hover:bg-surface-container-high transition-all scale-95 duration-150 rounded-lg px-3">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant py-1 hover:bg-surface-container-high transition-all scale-95 duration-150 rounded-lg px-3">
<span class="material-symbols-outlined mb-1">domain</span>
<span class="font-label-sm text-label-sm">Properties</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant py-1 hover:bg-surface-container-high transition-all scale-95 duration-150 rounded-lg px-3">
<span class="material-symbols-outlined mb-1">analytics</span>
<span class="font-label-sm text-label-sm">Analytics</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-fixed text-on-primary-fixed rounded-full px-4 py-1 hover:bg-surface-container-high transition-all scale-95 duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-label-sm text-label-sm">Clients</span>
</button>
</div>
</nav>
</body></html>
