[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "migrations"

[tool.ruff]
line-length = 100
exclude = ["migrations", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"data_manager.py" = ["UP006", "UP035"]
"database_service.py" = ["UP006", "UP035"]
"gemini_service.py" = ["UP006", "UP035"]
"sqlalchemy_models.py" = ["UP006", "UP035"]
"vector_init.py" = ["UP006", "UP035"]
"models.py" = ["UP006", "UP035"]
"schemas.py" = ["UP006", "UP035"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = "(migrations/|data_manager.py|vector_service.py|gemini_service.py|sqlalchemy_models.py|vector_init.py|tests/conftest.py)"
