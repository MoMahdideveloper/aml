[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "migrations"

[tool.ruff]
line-length = 100
exclude = ["migrations", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501", "F401"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = "(migrations/|data_manager.py|vector_service.py|gemini_service.py|sqlalchemy_models.py|vector_init.py|tests/conftest.py)"
