{# Card List Item Component — Platinum Heritage #}
<div class="p-4 hover:bg-surface-container-low transition-colors border-b border-outline-variant last:border-b-0">
    <div class="flex justify-between items-start gap-4">
        <div class="flex-1 min-w-0">
            <p class="font-medium text-on-surface truncate">
                {{ title }}
            </p>
            {% if subtitle %}
            <p class="text-on-surface-variant text-sm truncate mt-1">
                {{ subtitle }}
            </p>
            {% endif %}
            {% if price %}
            <p class="mt-2 font-semibold text-primary tabular-nums">
                ${{ "{:,.0f}".format(price) }}
            </p>
            {% endif %}
            {% if meta_text %}
            <p class="text-on-surface-variant text-sm mt-1">
                {{ meta_text }}
            </p>
            {% endif %}
        </div>

        {% if status %}
        <span class="shrink-0 inline-flex px-2 py-0.5 rounded-full text-xs font-medium border border-outline-variant capitalize
            {% if status == 'active' %}bg-primary/10 text-primary
            {% elif status == 'pending' %}bg-surface-container-high text-on-surface
            {% elif status in ['sold','closed_lost'] %}bg-error-container text-on-error-container
            {% else %}bg-surface-container text-on-surface-variant{% endif %}">
            {{ status|replace('_', ' ') }}
        </span>
        {% endif %}
    </div>
</div>
