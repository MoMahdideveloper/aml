{# Mobile header — Platinum Heritage #}
<header class="lg:hidden bg-surface-white border-b border-outline-variant shrink-0 sticky top-0 z-30">
    <div class="flex items-center justify-between px-4 py-3">
        <button id="mobile-menu-toggle"
                type="button"
                class="text-on-surface hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/20 rounded p-2 transition-colors"
                aria-label="Toggle menu"
                aria-expanded="false"
                aria-controls="sidebar">
            <i class="fas fa-bars text-xl"></i>
        </button>

        <div class="flex-1 text-center min-w-0 px-2">
            <h1 class="text-base text-on-surface font-semibold tracking-tight truncate">Platinum Heritage</h1>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-[0.12em]">CRM</p>
        </div>

        <div class="flex items-center gap-0.5">
            {# Match-alert inbox #}
            <div class="relative" id="ph-notif-root-mobile">
                <button type="button"
                        id="ph-notif-bell-mobile"
                        class="relative text-on-surface hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/20 rounded p-2 transition-colors"
                        aria-label="Match alerts"
                        aria-expanded="false"
                        aria-haspopup="true"
                        onclick="window.PHNotif && PHNotif.toggle(this)">
                    <span class="material-symbols-outlined text-[22px]">notifications</span>
                    <span id="ph-notif-badge-mobile"
                          class="hidden absolute top-1 right-1 min-w-[1rem] h-4 px-1 rounded-full bg-error text-on-primary text-[10px] font-bold flex items-center justify-center">0</span>
                </button>
                <div id="ph-notif-panel-mobile"
                     class="hidden absolute right-0 mt-2 w-80 max-w-[calc(100vw-2rem)] bg-surface-white border border-outline-variant shadow-ph rounded-lg z-50 overflow-hidden"
                     role="menu">
                    <div class="px-3 py-2 border-b border-outline-variant flex items-center justify-between">
                        <span class="text-xs font-semibold text-primary uppercase tracking-wide">Match alerts</span>
                        <button type="button" class="text-[11px] text-primary hover:underline" onclick="window.PHNotif && PHNotif.markAllRead()">Mark all read</button>
                    </div>
                    <div id="ph-notif-list-mobile" class="max-h-72 overflow-y-auto text-sm">
                        <p class="px-3 py-4 text-on-surface-variant text-xs">Loading…</p>
                    </div>
                    <a href="{{ url_for('main.recommendations') }}"
                       class="block text-center text-xs font-medium text-primary py-2.5 border-t border-outline-variant hover:bg-surface-container">
                        Open AI Match
                    </a>
                </div>
            </div>

            <div class="relative">
                <button type="button"
                        data-dropdown-toggle
                        class="text-on-surface hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/20 rounded p-2 transition-colors"
                        aria-expanded="false"
                        aria-haspopup="true">
                    <i class="fas fa-user-circle text-xl"></i>
                </button>

                <div data-dropdown-menu
                     class="hidden absolute right-0 mt-2 w-48 bg-surface-white border border-outline-variant shadow-ph rounded-lg py-1 z-50"
                     role="menu">
                    <a href="{{ url_for('auth.profile') }}" class="block px-4 py-2 text-sm text-on-surface hover:bg-surface-container" role="menuitem">
                        <i class="fas fa-user mr-2"></i>Profile
                    </a>
                    <a href="{{ url_for('auth.profile') }}" class="block px-4 py-2 text-sm text-on-surface hover:bg-surface-container" role="menuitem">
                        <i class="fas fa-cog mr-2"></i>Settings
                    </a>
                    <hr class="my-1 border-outline-variant">
                    <a href="{{ url_for('auth.logout') }}" class="block px-4 py-2 text-sm text-error hover:bg-error-container" role="menuitem">
                        <i class="fas fa-sign-out-alt mr-2"></i>Sign out
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
