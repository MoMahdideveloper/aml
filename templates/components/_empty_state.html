{# Empty State Component — Platinum Heritage
   Usage:
   {% include 'components/_empty_state.html' with {
       'icon': 'fa-building',
       'message': 'No properties available',
       'color': 'primary'
   } %}
#}
<div class="flex flex-col items-center justify-center py-8 text-center">
    <i class="fas {{ icon|default('fa-inbox') }} text-primary/20 text-4xl mb-4"></i>
    <p class="text-on-surface-variant text-sm">{{ message|default('Nothing here yet') }}</p>
    {% if action_url and action_text %}
    <a href="{{ action_url }}"
       class="mt-4 inline-flex items-center px-4 py-2 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity text-sm font-medium">
        <i class="fas fa-plus mr-2"></i>
        {{ action_text }}
    </a>
    {% endif %}
</div>
