<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Real Estate CRM{% endblock %}</title>

    <!-- Stitch Design System CSS -->
    <link href="{{ url_for('static', filename='css/stitch.css') }}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    {% block extra_css %}{% endblock %}
</head>
<body class="flex min-h-screen flex-col bg-[var(--background)]">
    <!-- Flash Messages Component -->
    {% include 'components/_flash_messages.html' %}

    <!-- Main Layout -->
    <div class="flex flex-1 overflow-hidden bg-[var(--background)]">
        <!-- Sidebar Component (Desktop) -->
        {% include 'components/_sidebar.html' %}

        <!-- Main Content Area -->
        <main class="flex-1 min-w-0 flex flex-col overflow-hidden">
            <!-- Mobile Header Component -->
            {% include 'components/_mobile_header.html' %}

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto">
                <div class="p-4 lg:p-6">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/app-core.js') }}"></script>
    {% block scripts %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
