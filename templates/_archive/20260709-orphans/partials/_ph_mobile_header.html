{## Platinum Heritage Mobile Header ##}
{# Used in mobile views when sidebar layout is active #}
<header class="lg:hidden bg-surface border-b border-outline/20">
    <div class="flex items-center justify-between px-4 py-4">
        <!-- Mobile Menu Toggle -->
        <button id="mobile-menu-toggle" class="text-on-surface hover:text-primary">
            <i class="fas fa-bars"></i>
        </button>
        
        <!-- Brand/Title -->
        <div class="flex-1 text-center">
            <h1 class="text-headline-lg-mobile text-on-surface font-semibold">LUXE ESTATE</h1>
        </div>
        
        <!-- User Actions -->
        <div class="flex-shrink-0">
            <div class="dropdown relative inline-block text-left">
                <button type="button" class="flex items-center text-sm font-medium text-on-surface hover:text-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-primary/50" id="userMenuButton" aria-expanded="false" aria-haspopup="true">
                    <span class="sr-only">Open user menu</span>
                    <i class="fas fa-user-circle"></i>
                </button>
                <!-- Dropdown menu -->
                <div class="hidden absolute right-0 mt-2 w-48 origin-top-right border-divider bg-surface-white shadow-lg rounded-md py-1 z-20 focus:outline-none" role="menu" aria-orientation="vertical" aria-labelledby="userMenuButton">
                    <div class="px-4 py-2 text-sm text-on-surface" role="none">
                        Profile
                    </div>
                    <div class="px-4 py-2 text-sm text-on-surface" role="none">
                        Settings
                    </div>
                    <hr class="my-1 border-outline/20" role="none">
                    <div class="px-4 py-2 text-sm text-on-surface" role="none">
                        Sign out
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

{# Mobile Sidebar Toggle Script #}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
    const sidebar = document.querySelector('aside:not(.hidden)');

    if (mobileMenuToggle && sidebar) {
        mobileMenuToggle.addEventListener('click', function() {
            sidebar.classList.toggle('-translate-x-full');
        });
    }

    // Close sidebar when clicking a link
    const sidebarLinks = document.querySelectorAll('aside:not(.hidden) nav a');
    sidebarLinks.forEach(link => {
        link.addEventListener('click', function() {
            const sidebar = document.querySelector('aside:not(.hidden)');
            if (sidebar) {
                sidebar.classList.add('-translate-x-full');
            }
        });
    });
});
</script>
