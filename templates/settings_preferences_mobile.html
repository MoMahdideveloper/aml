<style>
        body {
            background-color: #F4F2E5; /* Cream background */
            -webkit-tap-highlight-color: transparent;
        }
        .form-input-minimalist {
            border: 1px solid #C0C0C0; /* Platinum */
            background-color: #F4F2E5; /* Cream */
            border-radius: 0;
            transition: border-color 0.2s ease-in-out;
        }
        .form-input-minimalist:focus {
            border-color: #2A3A4B; /* Deep Blue */
            outline: none;
            box-shadow: none;
        }
        .touch-target {
            min-height: 44px;
        }
        
        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            background-color: #F4F2E5;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 1px solid #C0C0C0;
            border-radius: 0.15em;
            display: grid;
            place-content: center;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #2A3A4B;
            background-color: #2A3A4B;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }
        .custom-checkbox:focus {
             outline: max(2px, 0.15em) solid #C0C0C0;
             outline-offset: max(2px, 0.15em);
        }
    </style>
