<!-- Property Share Modal — Platinum Heritage -->
<div id="propertyShareModal"
     class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-[2px]"
     data-modal
     role="dialog"
     aria-modal="true"
     aria-labelledby="propertyShareModalLabel"
     aria-hidden="true">
    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-ph w-full max-w-md max-h-[90vh] flex flex-col"
         onclick="event.stopPropagation()">
        <div class="flex items-center justify-between gap-3 px-5 py-4 border-b border-outline-variant">
            <h2 id="propertyShareModalLabel" class="text-lg font-semibold text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">share</span>
                Share property
            </h2>
            <button type="button" data-modal-close
                    onclick="document.getElementById('propertyShareModal').classList.add('hidden'); document.body.style.overflow=''"
                    class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container" aria-label="Close">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <div class="px-5 py-5 overflow-y-auto">
            <div class="text-center mb-5">
                <h3 class="text-base font-semibold text-primary">{{ sharing.title if sharing is defined else 'Property' }}</h3>
                <p class="text-sm text-on-surface-variant mt-1">{{ sharing.address if sharing is defined else '' }}</p>
                {% if sharing is defined and sharing.price is defined %}
                <p class="mt-2 inline-flex px-3 py-1 rounded-full bg-primary text-on-primary text-sm font-medium tabular-nums">
                    ${{ "{:,.0f}".format(sharing.price) }}
                </p>
                {% endif %}
            </div>

            <div class="grid grid-cols-2 gap-3 mb-5">
                <button type="button" onclick="typeof shareViaEmail==='function'&&shareViaEmail()"
                        class="flex flex-col items-center gap-1 p-3 rounded-lg border border-outline-variant hover:border-primary hover:bg-surface-container-low transition-colors text-primary">
                    <span class="material-symbols-outlined">mail</span>
                    <span class="text-xs font-medium">Email</span>
                </button>
                <button type="button" onclick="typeof shareViaSMS==='function'&&shareViaSMS()"
                        class="flex flex-col items-center gap-1 p-3 rounded-lg border border-outline-variant hover:border-primary hover:bg-surface-container-low transition-colors text-primary">
                    <span class="material-symbols-outlined">sms</span>
                    <span class="text-xs font-medium">SMS</span>
                </button>
                <button type="button" onclick="typeof copyPropertyLink==='function'&&copyPropertyLink()"
                        class="flex flex-col items-center gap-1 p-3 rounded-lg border border-outline-variant hover:border-primary hover:bg-surface-container-low transition-colors text-primary">
                    <span class="material-symbols-outlined">link</span>
                    <span class="text-xs font-medium">Copy link</span>
                </button>
                <button type="button" onclick="typeof shareOnSocial==='function'&&shareOnSocial()"
                        class="flex flex-col items-center gap-1 p-3 rounded-lg border border-outline-variant hover:border-primary hover:bg-surface-container-low transition-colors text-primary">
                    <span class="material-symbols-outlined">public</span>
                    <span class="text-xs font-medium">Social</span>
                </button>
            </div>

            <label for="propertyLink" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Property link</label>
            <div class="flex gap-2">
                <input type="text" id="propertyLink" readonly
                       value="{{ sharing.url if sharing is defined else '' }}"
                       class="flex-1 px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm text-on-surface outline-none">
                <button type="button" onclick="typeof copyPropertyLink==='function'&&copyPropertyLink()"
                        class="px-3 py-2 rounded-lg border border-outline-variant text-primary hover:bg-surface-container" aria-label="Copy">
                    <span class="material-symbols-outlined text-[18px]">content_copy</span>
                </button>
            </div>
            <div id="qrcode" class="mt-4 text-center text-xs text-on-surface-variant"></div>
        </div>

        <div class="px-5 py-4 border-t border-outline-variant flex justify-end gap-2 bg-surface-container-low/40">
            <button type="button" data-modal-close
                    onclick="document.getElementById('propertyShareModal').classList.add('hidden'); document.body.style.overflow=''"
                    class="px-4 py-2 rounded-lg border border-outline-variant text-sm font-medium text-primary hover:bg-surface-container">
                Close
            </button>
            <button type="button" onclick="typeof generatePropertyFlyer==='function'&&generatePropertyFlyer()"
                    class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium hover:opacity-90 inline-flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">picture_as_pdf</span>
                Flyer
            </button>
        </div>
    </div>
</div>

<script>
let currentPropertyData = null;
function initializePropertyShare(propertyData) {
    currentPropertyData = propertyData || null;
    const link = document.getElementById('propertyLink');
    if (link && propertyData && propertyData.url) link.value = propertyData.url;
}
function copyPropertyLink() {
    const link = document.getElementById('propertyLink');
    if (!link) return;
    link.select();
    navigator.clipboard?.writeText(link.value).catch(() => document.execCommand('copy'));
}
function shareViaEmail() {
    const link = document.getElementById('propertyLink')?.value || '';
    const title = currentPropertyData?.title || 'Property';
    window.location.href = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(link)}`;
}
function shareViaSMS() {
    const link = document.getElementById('propertyLink')?.value || '';
    window.location.href = `sms:?body=${encodeURIComponent(link)}`;
}
function shareOnSocial() {
    const link = document.getElementById('propertyLink')?.value || '';
    if (navigator.share) navigator.share({ url: link }).catch(() => {});
    else copyPropertyLink();
}
function generatePropertyFlyer() {
    window.print();
}
</script>
