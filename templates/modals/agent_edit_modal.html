<!-- Agent Edit Modal — Platinum Heritage -->
<div id="agentEditModal"
     class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-[2px]"
     data-modal
     role="dialog"
     aria-labelledby="agentEditModalLabel"
     aria-describedby="agentEditModalDescription"
     aria-hidden="true"
     aria-modal="true">
    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-ph w-full max-w-2xl max-h-[90vh] flex flex-col"
         onclick="event.stopPropagation()">
        <div class="flex items-center justify-between gap-3 px-5 py-4 border-b border-outline-variant">
            <h2 id="agentEditModalLabel" class="text-lg font-semibold text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">edit_square</span>
                Edit agent
            </h2>
            <button type="button" onclick="typeof closeEditModal==='function'?closeEditModal():document.getElementById('agentEditModal').classList.add('hidden')"
                    class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container" aria-label="Close">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <div class="px-5 py-4 overflow-y-auto flex-1">
            <p id="agentEditModalDescription" class="sr-only">Update agent contact and specialization.</p>

            <div id="agentEditModal_loading" class="hidden flex-col items-center justify-center py-8">
                <div class="h-8 w-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-3 text-sm text-on-surface-variant">Loading agent…</p>
            </div>

            <div id="agentEditModal_error" class="hidden mb-4 p-3 rounded-lg bg-error-container text-on-error-container text-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">error</span>
                <span id="agentEditModal_error_message"></span>
            </div>

            <form id="agentEditForm" method="POST" action="#" class="space-y-4">
                {% if csrf_token is defined %}
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                {% endif %}
                <input type="hidden" name="agent_id" id="edit_agent_id" value="">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="edit_agent_name" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Name *</label>
                        <input type="text" id="edit_agent_name" name="name" required
                               class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                    </div>
                    <div>
                        <label for="edit_agent_email" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Email *</label>
                        <input type="email" id="edit_agent_email" name="email" required
                               class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                    </div>
                    <div>
                        <label for="edit_agent_phone" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Phone *</label>
                        <input type="tel" id="edit_agent_phone" name="phone" required
                               class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                    </div>
                    <div>
                        <label for="edit_agent_specialization" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Specialization</label>
                        <input type="text" id="edit_agent_specialization" name="specialization"
                               class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label for="edit_agent_bio" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Bio</label>
                        <textarea id="edit_agent_bio" name="bio" rows="3"
                                  class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none"
                                  placeholder="Short bio (optional)"></textarea>
                    </div>
                </div>
            </form>
        </div>

        <div class="px-5 py-4 border-t border-outline-variant flex justify-end gap-2">
            <button type="button" onclick="typeof closeEditModal==='function'?closeEditModal():document.getElementById('agentEditModal').classList.add('hidden')"
                    class="px-4 py-2 rounded-lg border border-outline-variant text-sm font-medium text-primary hover:bg-surface-container">
                Cancel
            </button>
            <button type="submit" form="agentEditForm"
                    class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium hover:opacity-90">
                Save agent
            </button>
        </div>
    </div>
</div>

<script>
window.closeEditModal = function () {
    const modal = document.getElementById('agentEditModal');
    if (modal) {
        modal.classList.add('hidden');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }
};
</script>
