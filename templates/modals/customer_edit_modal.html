<!-- Customer Edit Modal Content — Platinum Heritage -->
<form id="customerEditForm" method="POST" action="/customers/{{ customer.id }}/edit" class="space-y-6">
    {% if csrf_token is defined %}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% endif %}
    <input type="hidden" name="_method" value="PUT">

    <section>
        <h3 class="text-sm font-semibold text-primary uppercase tracking-wide mb-3">Basic information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="edit_name" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Full name *</label>
                <input type="text" id="edit_name" name="name" required
                       value="{{ form.name.data if form is defined and form.name is defined else customer.name }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
            </div>
            <div>
                <label for="edit_email" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Email *</label>
                <input type="email" id="edit_email" name="email" required
                       value="{{ form.email.data if form is defined and form.email is defined else customer.email }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
            </div>
            <div class="md:col-span-2">
                <label for="edit_phone" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Phone *</label>
                <input type="tel" id="edit_phone" name="phone" required
                       value="{{ form.phone.data if form is defined and form.phone is defined else customer.phone }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
            </div>
        </div>
    </section>

    <section class="border-t border-outline-variant pt-5">
        <h3 class="text-sm font-semibold text-primary uppercase tracking-wide mb-3">Budget range</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="edit_budget_min" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Minimum</label>
                <input type="number" id="edit_budget_min" name="budget_min" step="1000" min="0"
                       value="{{ form.budget_min.data if form is defined and form.budget_min is defined else customer.budget_min or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
                       placeholder="e.g. 250000">
            </div>
            <div>
                <label for="edit_budget_max" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Maximum</label>
                <input type="number" id="edit_budget_max" name="budget_max" step="1000" min="0"
                       value="{{ form.budget_max.data if form is defined and form.budget_max is defined else customer.budget_max or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
                       placeholder="e.g. 500000">
            </div>
        </div>
    </section>

    <section class="border-t border-outline-variant pt-5">
        <h3 class="text-sm font-semibold text-primary uppercase tracking-wide mb-3">Preferences</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="edit_preferred_bedrooms" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Bedrooms</label>
                <input type="number" id="edit_preferred_bedrooms" name="preferred_bedrooms" min="0"
                       value="{{ form.preferred_bedrooms.data if form is defined and form.preferred_bedrooms is defined else customer.preferred_bedrooms or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
            </div>
            <div>
                <label for="edit_preferred_bathrooms" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Bathrooms</label>
                <input type="number" id="edit_preferred_bathrooms" name="preferred_bathrooms" min="0" step="0.5"
                       value="{{ form.preferred_bathrooms.data if form is defined and form.preferred_bathrooms is defined else customer.preferred_bathrooms or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
            </div>
            <div>
                <label for="edit_preferred_type" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Property type</label>
                <input type="text" id="edit_preferred_type" name="preferred_type"
                       value="{{ form.preferred_type.data if form is defined and form.preferred_type is defined else customer.preferred_type or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
            </div>
            <div>
                <label for="edit_location_preference" class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Location</label>
                <input type="text" id="edit_location_preference" name="location_preference"
                       value="{{ form.location_preference.data if form is defined and form.location_preference is defined else customer.location_preference or '' }}"
                       class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
            </div>
        </div>
    </section>

    <div class="flex justify-end gap-2 pt-2 border-t border-outline-variant">
        <button type="button" data-modal-close
                class="px-4 py-2 rounded-lg border border-outline-variant text-sm font-medium text-primary hover:bg-surface-container">
            Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium hover:opacity-90">
            Save customer
        </button>
    </div>
</form>
