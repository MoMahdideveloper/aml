<!-- Private Viewing Scheduler — Platinum Heritage -->
<div id="viewingScheduleModal"
     class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-[2px]"
     data-modal
     role="dialog"
     aria-modal="true"
     aria-labelledby="viewingScheduleModalLabel">
    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-ph w-full max-w-lg max-h-[90vh] flex flex-col"
         onclick="event.stopPropagation()">
        <div class="flex items-center justify-between gap-3 px-5 py-4 border-b border-outline-variant">
            <h2 id="viewingScheduleModalLabel" class="text-lg font-semibold text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">event</span>
                Schedule viewing
            </h2>
            <button type="button" data-modal-close
                    onclick="document.getElementById('viewingScheduleModal').classList.add('hidden'); document.body.style.overflow=''"
                    class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container" aria-label="Close">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
        <form method="POST" action="{{ form_action|default('#') }}" class="flex flex-col flex-1 min-h-0" id="viewingScheduleForm">
            {% if csrf_token is defined %}
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% endif %}
            <div class="px-5 py-4 space-y-4 overflow-y-auto">
                {% if property is defined and property %}
                <p class="text-sm text-on-surface-variant">
                    Property:
                    <span class="font-medium text-primary" id="viewingPropertyTitle">{{ property.title if property.title is defined else property }}</span>
                </p>
                {% endif %}
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Date *</label>
                    <input type="date" name="viewing_date" required
                           class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Time *</label>
                    <input type="time" name="viewing_time" required
                           class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Assigned agent *</label>
                    <select name="agent_id" required
                            class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                        <option value="">Select agent</option>
                        {% for agent in agents|default([]) %}
                        <option value="{{ agent.id }}"
                                {% if property is defined and property.agent_id is defined and property.agent_id == agent.id %}selected
                                {% elif loop.first %}selected{% endif %}>
                            {{ agent.name }}{% if agent.specialization %} · {{ agent.specialization }}{% endif %}
                        </option>
                        {% endfor %}
                    </select>
                    {% if not agents|default([]) %}
                    <p class="text-xs text-error mt-1">No agents available — add an agent first.</p>
                    {% endif %}
                </div>
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Client</label>
                    <input type="text" name="client_name" placeholder="Client name"
                           value="{{ customer.name if customer is defined and customer else '' }}"
                           class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Notes</label>
                    <textarea name="notes" rows="3" placeholder="Access instructions, preferences…"
                              class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"></textarea>
                </div>
            </div>
            <div class="px-5 py-4 border-t border-outline-variant flex justify-end gap-2">
                <button type="button" data-modal-close
                        onclick="document.getElementById('viewingScheduleModal').classList.add('hidden'); document.body.style.overflow=''"
                        class="px-4 py-2 rounded-lg border border-outline-variant text-sm font-medium text-primary hover:bg-surface-container">
                    Cancel
                </button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium hover:opacity-90">
                    Schedule
                </button>
            </div>
        </form>
    </div>
</div>
