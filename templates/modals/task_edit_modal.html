<!-- Task Edit Modal — Platinum Heritage -->
<div id="taskEditModal"
     class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 bg-on-surface/40 backdrop-blur-[2px]"
     data-modal
     role="dialog"
     aria-modal="true"
     aria-labelledby="taskEditModalLabel">
    <div class="bg-surface-container-lowest rounded-lg border border-outline-variant shadow-ph w-full max-w-lg max-h-[90vh] flex flex-col"
         onclick="event.stopPropagation()">
        <div class="flex items-center justify-between gap-3 px-5 py-4 border-b border-outline-variant">
            <h2 id="taskEditModalLabel" class="text-lg font-semibold text-primary flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">edit_note</span>
                {% if task %}Edit task{% else %}Task{% endif %}
            </h2>
            <button type="button" data-modal-close
                    onclick="document.getElementById('taskEditModal').classList.add('hidden'); document.body.style.overflow=''"
                    class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container" aria-label="Close">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
        <form method="POST"
              action="{{ url_for('add_task') }}"
              class="flex flex-col flex-1 min-h-0"
              id="taskEditForm">
            {% if csrf_token is defined %}
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% endif %}
            <div class="px-5 py-4 space-y-4 overflow-y-auto">
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Title *</label>
                    <input type="text" name="title" required
                           value="{{ task.title if task is defined and task else '' }}"
                           class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Description</label>
                    <textarea name="description" rows="3"
                              class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none">{{ task.description if task is defined and task and task.description is defined else '' }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Priority</label>
                        <select name="priority" class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                            {% for p in ['low','medium','high','urgent'] %}
                            <option value="{{ p }}" {% if task is defined and task and task.priority == p %}selected{% endif %}>{{ p|capitalize }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Due date</label>
                        <input type="date" name="due_date"
                               value="{{ task.due_date.strftime('%Y-%m-%d') if task is defined and task and task.due_date and task.due_date.strftime is defined else '' }}"
                               class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                    </div>
                </div>
                {% if agents is defined %}
                <div>
                    <label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1.5">Assignee</label>
                    <select name="agent_id" class="w-full px-3 py-2.5 bg-background border border-outline-variant rounded-lg text-sm focus:border-primary outline-none">
                        <option value="">Unassigned</option>
                        {% for a in agents %}
                        <option value="{{ a.id }}" {% if task is defined and task and task.agent_id == a.id %}selected{% endif %}>{{ a.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
            </div>
            <div class="px-5 py-4 border-t border-outline-variant flex justify-end gap-2">
                <button type="button" data-modal-close
                        onclick="document.getElementById('taskEditModal').classList.add('hidden'); document.body.style.overflow=''"
                        class="px-4 py-2 rounded-lg border border-outline-variant text-sm font-medium text-primary hover:bg-surface-container">
                    Cancel
                </button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium hover:opacity-90">
                    Save task
                </button>
            </div>
        </form>
    </div>
</div>
