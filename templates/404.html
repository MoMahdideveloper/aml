{% extends 'base.html' %}

{% block title %}Page Not Found · Platinum Heritage{% endblock %}

{% block content %}
<div class="flex justify-center py-16 px-4">
    <div class="w-full max-w-md text-center space-y-5">
        <p class="text-6xl font-bold text-primary tabular-nums">404</p>
        <h1 class="text-2xl font-semibold text-on-surface">Page not found</h1>
        <p class="text-on-surface-variant">
            That page doesn’t exist or may have been moved.
        </p>
        <a href="{{ url_for('dashboard') }}"
           class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-primary text-on-primary rounded-lg hover:opacity-90 transition-opacity font-medium text-sm">
            <span class="material-symbols-outlined text-[18px]">home</span>
            Back to dashboard
        </a>
    </div>
</div>
{% endblock %}
