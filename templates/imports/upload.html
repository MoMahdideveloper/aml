{% extends "base.html" %}
{% block title %}Upload CSV{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto p-4">
  <h1 class="text-2xl font-semibold text-primary mb-4">Upload CSV</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4 border border-outline-variant rounded-lg p-5 bg-surface-container-lowest">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
    <div>
      <label class="block text-xs uppercase tracking-wide mb-1" for="entity_type">Entity</label>
      <select id="entity_type" name="entity_type" required class="w-full border border-outline-variant rounded-lg px-3 py-2">
        <option value="customer">Customers</option>
        <option value="property">Properties</option>
        <option value="deal">Deals</option>
      </select>
    </div>
    <div>
      <label class="block text-xs uppercase tracking-wide mb-1" for="file">CSV file (UTF-8, max 2MB / 500 rows)</label>
      <input id="file" name="file" type="file" accept=".csv,text/csv" required class="w-full text-sm">
    </div>
    <button type="submit" class="px-4 py-2 rounded-lg bg-primary text-on-primary text-sm font-medium">Upload</button>
    <a href="{{ url_for('imports.import_index') }}" class="text-sm ml-3">Cancel</a>
  </form>
</div>
{% endblock %}
