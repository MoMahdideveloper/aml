name: Release image (immutable artifact)

# Builds Track A production image and metadata. Does NOT deploy.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, only generate metadata (skip docker build)"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Generate metadata
        run: |
          python -m pip install -q -r requirements.txt
          python scripts/ci/release_metadata.py \
            --out artifacts/release-metadata.json \
            --image-tag "ghcr.io/${{ github.repository }}/gptvli-web:${{ github.sha }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: artifacts/release-metadata.json
          retention-days: 30

  docker:
    name: Build production image
    runs-on: ubuntu-latest
    needs: [metadata]
    if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push by default)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            gptvli-web:${{ github.sha }}
            gptvli-web:ci-local
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke image with synthetic env
        run: |
          docker run --rm \
            -e FLASK_ENV=production \
            -e SESSION_SECRET=ci-image-secret-not-for-prod \
            -e ALLOW_INSECURE_SECRET=1 \
            -e DATABASE_URL=sqlite:////tmp/ci.db \
            -e USE_TAILWIND_CDN=0 \
            -e ENABLE_CSRF=0 \
            -e RUN_MIGRATIONS=0 \
            -e AUTH_DEFAULT_DENY_ENABLED=0 \
            gptvli-web:ci-local \
            python -c "from app import create_app; a=create_app(); c=a.test_client(); r=c.get('/healthz'); assert r.status_code==200; print('image smoke OK')"
