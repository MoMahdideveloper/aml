name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: sqlite:///:memory:
  SESSION_SECRET: ci-test-secret-not-for-production
  USE_TAILWIND_CDN: "0"
  ENABLE_CSRF: "0"
  FLASK_ENV: testing

jobs:
  css:
    name: Build CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install & build Tailwind
        run: |
          npm ci --ignore-scripts
          npm run build:css

      - name: Verify production CSS artifact
        run: |
          test -f static/css/tailwind-ph.css
          test "$(wc -c < static/css/tailwind-ph.css)" -gt 10000
          echo "tailwind-ph.css size: $(wc -c < static/css/tailwind-ph.css) bytes"

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailwind-ph-css
          path: static/css/tailwind-ph.css
          retention-days: 7

  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install -q ruff black

      - name: Ruff (views + app factory)
        run: ruff check app.py views forms.py database.py extensions.py services/geo_service.py services/sms_service.py

      - name: Black (check focused paths)
        run: |
          black --check app.py views/main.py views/agents.py views/properties.py views/property_media.py services/geo_service.py || true

  core-tests:
    name: Core tests
    runs-on: ubuntu-latest
    needs: [css]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download built CSS
        uses: actions/download-artifact@v4
        with:
          name: tailwind-ph-css
          path: static/css

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt
          pip install -q pytest pytest-cov

      - name: Run Platinum Heritage + smoke suite
        run: |
          pytest -q \
            tests/test_platinum_heritage_ui.py \
            tests/test_app_smoke.py \
            tests/test_simple.py \
            tests/test_template_replacement.py \
            --tb=short

  full-tests:
    name: Full test suite
    runs-on: ubuntu-latest
    needs: [core-tests]
    # Informative full run — does not block merge if legacy tests are flaky
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Run all tests
        run: pytest -q --tb=line --maxfail=30
