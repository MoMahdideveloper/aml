name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install -q ruff black mypy

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: Mypy (lenient subset)
        run: mypy views app.py database.py database_service.py forms.py init_db.py --ignore-missing-imports --follow-imports=skip

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pytest pytest-cov flask flask-sqlalchemy flask-migrate sqlalchemy flask-wtf wtforms

      - name: Run tests (with coverage)
        env:
          DATABASE_URL: sqlite:///:memory:
        run: |
          pytest -q \
            --cov=views --cov=app --cov=database --cov=database_service --cov=forms \
            --cov-report=term-missing --cov-fail-under=45
