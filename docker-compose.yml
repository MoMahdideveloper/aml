version: '3.8'

# Profiles:
#   crm      — Redis for Flask Celery/cache (product path)
#   matching — Neo4j + Redis + ingestor/matcher/api/chatbot (experimental)
#
# Examples:
#   docker compose --profile crm up -d
#   docker compose --profile matching up -d --build
#   docker compose --profile matching down

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: ["crm", "matching"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.13
    container_name: neo4j
    profiles: ["matching"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/changemeplease
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
      - ./neo4j/plugins:/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Ingestor — experimental matching stack
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    profiles: ["matching"]
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ingestor:/app
      - ./ingestor/logs:/app/logs
    restart: unless-stopped

  # Matcher — experimental matching stack
  matcher:
    build:
      context: ./matcher
      dockerfile: Dockerfile
    container_name: matcher
    profiles: ["matching"]
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - WORKER_CONCURRENCY=4
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./matcher:/app
      - ./matcher/logs:/app/logs
    restart: unless-stopped

  # API — experimental matching stack
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    profiles: ["matching"]
    ports:
      - "3000:3000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./api/logs:/app/logs
    restart: unless-stopped

  # Chatbot — experimental matching stack
  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: chatbot
    profiles: ["matching"]
    ports:
      - "8002:8002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./chatbot:/app
      - ./chatbot/logs:/app/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
