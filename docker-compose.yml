# Profiles:
#   prod     — Postgres + Flask CRM (gunicorn) production-style stack
#   crm      — Redis for Flask Celery/cache (product path)
#   matching — Neo4j + Redis + ingestor/matcher/api/chatbot (experimental)
#
# Examples:
#   docker compose --profile prod up -d --build
#   docker compose --profile crm up -d
#   docker compose --profile matching up -d --build
#   docker compose --profile prod down

services:
  db:
    image: postgres:16-alpine
    container_name: gptvli-db
    profiles: ["prod"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gptvli}
      # Required for prod — no weak default password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gptvli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gptvli} -d ${POSTGRES_DB:-gptvli}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gptvli-web
    profiles: ["prod"]
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      FLASK_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-gptvli}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gptvli}
      USE_TAILWIND_CDN: "0"
      ENABLE_CSRF: ${ENABLE_CSRF:-1}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      MIGRATION_RETRIES: ${MIGRATION_RETRIES:-10}
      MIGRATION_RETRY_DELAY: ${MIGRATION_RETRY_DELAY:-3}
      SMS_PROVIDER: ${SMS_PROVIDER:-log}
      GEOCODE_PROVIDER: ${GEOCODE_PROVIDER:-auto}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - uploads_data:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Gate on DB-backed readiness, not process liveness alone
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: ["crm", "matching", "prod"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.13
    container_name: neo4j
    profiles: ["matching"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/changemeplease
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/conf:/conf
      - ./neo4j/plugins:/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Ingestor — experimental matching stack
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    profiles: ["matching"]
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ingestor:/app
      - ./ingestor/logs:/app/logs
    restart: unless-stopped

  # Matcher — experimental matching stack
  matcher:
    build:
      context: ./matcher
      dockerfile: Dockerfile
    container_name: matcher
    profiles: ["matching"]
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - WORKER_CONCURRENCY=4
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./matcher:/app
      - ./matcher/logs:/app/logs
    restart: unless-stopped

  # API — experimental matching stack
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    profiles: ["matching"]
    ports:
      - "3000:3000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./api/logs:/app/logs
    restart: unless-stopped

  # Chatbot — experimental matching stack
  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: chatbot
    profiles: ["matching"]
    ports:
      - "8002:8002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changemeplease
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - LOG_LEVEL=info
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./chatbot:/app
      - ./chatbot/logs:/app/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
  uploads_data:
